<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리듬 훈련 (Vivid Orange Ver)</title>
    <style>
        body {
            background-color: #fffbf0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            color: #4e342e;
        }

        /* --- 레이아웃 --- */
        .container {
            display: flex;
            flex-direction: row;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            gap: 40px;
        }

        .left-panel {
            flex: 1;
            background: #ffffff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(78, 52, 46, 0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
            height: fit-content;
            position: sticky;
            top: 20px; 
            border: 1px solid #efebe9;
        }

        .right-panel {
            flex: 2;
            background: #ffffff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(78, 52, 46, 0.08);
            display: flex;
            flex-direction: column;
            border: 1px solid #efebe9;
        }

        @media (max-width: 900px) {
            .container { flex-direction: column; gap: 20px; }
            .left-panel { position: static; width: auto; }
        }

        h2 {
            color: #4e342e;
            font-size: 1.8rem;
            font-weight: 800;
            margin: 0 0 30px 0;
            text-align: center;
            border-bottom: 4px solid #ff9800;
            padding-bottom: 10px;
            width: 100%;
        }

        /* --- 메트로놈 UI --- */
        .emoji-container {
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            width: 100%;
            background-color: #fff3e0;
            border-radius: 15px;
        }

        .emoji-display {
            font-size: 6rem;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .play-btn {
            background-color: #ff9800;
            color: white;
            border: none;
            padding: 15px 0;
            width: 100%;
            font-size: 1.5rem;
            font-weight: 800;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(255, 152, 0, 0.3);
            transition: all 0.1s ease;
        }
        .play-btn:active { transform: scale(0.98); }
        .play-btn.playing {
            background-color: #f57c00;
            box-shadow: 0 6px 15px rgba(245, 124, 0, 0.3);
        }

        /* --- 우측 패널 UI --- */
        .section-header {
            font-size: 1.2rem;
            color: #8d6e63;
            margin-bottom: 15px;
            font-weight: 700;
            border-left: 5px solid #ff9800;
            padding-left: 10px;
        }

        .day-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
            margin-bottom: 30px;
        }

        .day-btn {
            background-color: #fff;
            border: 1px solid #d7ccc8;
            border-radius: 8px;
            padding: 10px 5px;
            font-size: 0.9rem;
            color: #5d4037;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }
        .day-btn:hover { background-color: #efebe9; }
        .day-btn.active {
            background-color: #ffe0b2;
            border-color: #ff9800;
            color: #e65100;
            font-weight: 800;
        }

        #selectedDayTitle {
            font-size: 1.5rem;
            font-weight: 800;
            color: #4e342e;
            margin-bottom: 25px;
            padding: 10px;
            background-color: #fff8e1;
            border-radius: 10px;
            text-align: center;
            display: none;
        }

        /* --- 카드 및 리스트 스타일 --- */
        .word-row {
            display: flex;
            flex-direction: column; 
            gap: 15px;
            margin-bottom: 25px;
            padding-bottom: 25px;
            border-bottom: 1px solid #efebe9;
        }

        .word-top-section {
            display: flex;
            flex-direction: row; 
            align-items: flex-start;
            gap: 15px; 
            flex-wrap: nowrap; 
            width: 100%;
            overflow-x: auto; 
            -ms-overflow-style: none; 
            scrollbar-width: none; 
        }
        .word-top-section::-webkit-scrollbar {
            display: none; 
        }

        .word-col {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 140px; 
            flex-shrink: 0;
        }

        .word-card-main {
            background-color: #ff9800;
            color: #3e2723;
            border: none;
            box-shadow: none;
            padding: 0 10px;
            height: 60px; 
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-size: 1.4rem; 
            font-weight: 400; 
            width: 100%;
            box-sizing: border-box;
        }
        .word-card-main b { font-weight: 900; }

        .audio-btn-group {
            display: flex;
            gap: 6px;
            width: 100%;
        }

        .audio-btn {
            flex: 1;
            background-color: #fff3e0;
            color: #e65100;
            border: 1px solid #ffb74d;
            border-radius: 6px;
            padding: 6px 0;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap; 
            letter-spacing: -0.5px; 
        }

        .audio-btn:hover { background-color: #ffe0b2; }
        .audio-btn:active { transform: scale(0.95); }

        .syllable-container {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: nowrap; 
            flex-shrink: 0; 
        }

        .syllable-card {
            min-width: 70px; 
            height: 60px;
            padding: 0 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.4rem;
            border-radius: 12px;
            background-color: white;
            box-sizing: border-box;
        }
        
        .syllable-strong {
            border: 3px solid #ff9800;
            color: #3e2723;
            font-weight: 900;
        }
        
        .syllable-secondary {
            border: 2px dashed #ff9800; 
            color: #3e2723; 
            font-weight: 700;
        }
        
        .syllable-weak {
            border: 2px dashed #bcaaa4;
            color: #8d6e63;
        }

        .step-box {
            background-color: #fff3e0;
            border-left: 5px solid #ffcc80;
            padding: 15px 20px;
            border-radius: 8px; 
            font-size: 1.2rem; 
            color: #5d4037;
            line-height: 1.6;
            width: 100%; 
            box-sizing: border-box;
            word-break: keep-all; 
            overflow-wrap: break-word; 
        }
        .step-highlight {
            color: #e65100;
            font-weight: 700;
        }

        @media (max-width: 600px) {
            .word-top-section { gap: 8px; }
            .word-col { width: 110px; }
            .word-card-main { height: 50px; font-size: 1.2rem; }
            .audio-btn { font-size: 0.75rem; padding: 5px 0; }
            .syllable-container { gap: 6px; }
            .syllable-card { min-width: 50px; height: 50px; font-size: 1.2rem; padding: 0 10px; }
            .step-box { font-size: 1rem; padding: 12px 15px; }
        }

    </style>
</head>
<body>

<div class="container" id="main-content">
    <div class="left-panel">
        <h2>단어 리듬 훈련</h2>
        <div class="emoji-container">
            <div id="visualDisplay" class="emoji-display">🫸🏻 🫷🏻</div>
        </div>
        <button id="playBtn" class="play-btn">START</button>
        <div style="margin-top: 20px; font-size: 0.9rem; color: #8d6e63; text-align: center;">
            소리를 켜고<br>주황색 테두리에 강세를 주세요!
        </div>
    </div>

    <div class="right-panel">
        <div class="section-header">학습할 음소 선택</div>
        <div id="dayButtons" class="day-grid"></div>

        <div id="selectedDayTitle"></div>
        
        <div id="wordList">
            <div style="text-align: center; color: #bcaaa4; padding: 40px;">
                위에서 학습할 버튼을 눌러주세요.
            </div>
        </div>
    </div>
</div>

            { w: "<b>scram</b>ble", ipa_parts: ["skræm", "bəl"], stress: 0, steps: "s - s - skræ - skræ - skræm - skræm.bəl - ˈskræm.bəl" },
            { w: "<b>spring</b>", ipa_parts: ["sprɪŋ"], stress: 0, steps: "s - s - sprɪ - sprɪ - sprɪŋ" },
            { w: "<b>street</b>", ipa_parts: ["striːt"], stress: 0, steps: "s - s - striː - striː - striːt" },
            { w: "<b>strong</b>", ipa_parts: ["strɑːŋ"], stress: 0, steps: "s - s - strɑː - strɑː - strɑːŋ" }
        ]},
        { day: 44, title: "3음절/4음절 긴 단어", words: [
            { w: "<b>tel</b>ephone", ipa_parts: ["tel", "ə", "foʊn"], stress: 0, steps: "t - t - te - te - tel - tel.ə - tel.ə.foʊn - ˈtel.ə.foʊn" },
            { w: "<b>el</b>ephant", ipa_parts: ["el", "ə", "fənt"], stress: 0, steps: "e - e - el - el.ə - el.ə.fənt - ˈel.ə.fənt" },
            { w: "<b>choc</b>olate", ipa_parts: ["tʃɑːk", "lət"], stress: 0, steps: "tʃ - tʃ - tʃɑː - tʃɑː - tʃɑːk - tʃɑːk.lət - ˈtʃɑːk.lət" },
            { w: "de<b>li</b>cious", ipa_parts: ["dɪ", "lɪʃ", "əs"], stress: 1, steps: "l - l - lɪ - lɪ - lɪʃ - lɪʃ.əs - dɪˈlɪʃ.əs" },
            { w: "<b>for</b>tunate", ipa_parts: ["fɔːr", "tʃən", "ət"], stress: 0, steps: "f - f - fɔːr - fɔːr - fɔːr.tʃən - fɔːr.tʃən.ət - ˈfɔːr.tʃən.ət" },
            { w: "communi<b>ca</b>tion", ipa_parts: ["kə", "mjuː", "nɪ", "keɪ", "ʃən"], stress: 3, steps: "k - k - ke - ke - keɪ - keɪ.ʃən - nɪ.keɪ.ʃən - mjuː.nɪ.keɪ.ʃən - kə.mjuː.nɪ.keɪ.ʃən - kəˌmjuː.nɪˈkeɪ.ʃən" },
            { w: "vo<b>cab</b>ulary", ipa_parts: ["voʊ", "kæb", "jə", "ler", "i"], stress: 1, steps: "k - k - kæ - kæ - kæb - kæb.jə - kæb.jə.ler - kæb.jə.ler.i - voʊˈkæb.jə.ler.i" },
            { w: "uni<b>ver</b>sity", ipa_parts: ["juː", "nə", "vɜːr", "sə", "t̬i"], stress: 2, steps: "v - v - vɜːr - vɜːr - vɜːr.sə - vɜːr.sə.t̬i - nə.vɜːr.sə.t̬i - juː.nə.vɜːr.sə.t̬i - ˌjuː.nəˈvɜːr.sə.t̬i" },
            { w: "cele<b>bra</b>tion", ipa_parts: ["sel", "ə", "breɪ", "ʃən"], stress: 2, steps: "b - b - bre - bre - breɪ - breɪ.ʃən - ə.breɪ.ʃən - sel.ə.breɪ.ʃən - ˌsel.əˈbreɪ.ʃən" },
            { w: "<b>dic</b>tionary", ipa_parts: ["dɪk", "ʃən", "er", "i"], stress: 0, steps: "d - d - dɪ - dɪ - dɪk - dɪk.ʃən - dɪk.ʃən.er - dɪk.ʃən.er.i - ˈdɪk.ʃən.er.i" }
        ]}
    ];

    let currentAudio = null;

    function playWordAudio(word, rate) {
        if (currentAudio) {
            currentAudio.pause();
            currentAudio.currentTime = 0;
        }

        const cleanWord = word.replace(/<[^>]+>/g, '').toLowerCase().trim();
        const audioPath = `audio/${cleanWord}.mp3`; 

        currentAudio = new Audio(audioPath);
        currentAudio.playbackRate = rate;
        currentAudio.preservesPitch = true; 

        currentAudio.play().catch(error => {
            console.error("음원 재생 오류:", error);
            alert(`음원 파일을 찾을 수 없습니다: ${audioPath}\nHTML 파일과 같은 폴더에 'audio' 폴더를 만들고 '${cleanWord}.mp3' 파일을 넣어주세요.`);
        });
    }

    const dayButtonsContainer = document.getElementById('dayButtons');
    const selectedDayTitle = document.getElementById('selectedDayTitle');
    const wordListContainer = document.getElementById('wordList');

    wordData.forEach((data, index) => {
        const btn = document.createElement('button');
        btn.classList.add('day-btn');
        btn.innerText = `Day ${data.day}`;
        btn.addEventListener('click', () => selectDay(index));
        dayButtonsContainer.appendChild(btn);
    });

    function selectDay(index) {
        const data = wordData[index];
        const buttons = document.querySelectorAll('.day-btn');
        buttons.forEach((b, i) => {
            if (i === index) b.classList.add('active');
            else b.classList.remove('active');
        });

        selectedDayTitle.style.display = 'block';
        selectedDayTitle.innerText = `Day ${data.day}: ${data.title}`;
        wordListContainer.innerHTML = '';

        data.words.forEach(wordObj => {
            const row = document.createElement('div');
            row.classList.add('word-row');

            const topSection = document.createElement('div');
            topSection.classList.add('word-top-section');

            const wordCol = document.createElement('div');
            wordCol.classList.add('word-col');

            const wordCard = document.createElement('div');
            wordCard.classList.add('word-card-main');
            wordCard.innerHTML = wordObj.w; 
            wordCol.appendChild(wordCard);

            const audioGroup = document.createElement('div');
            audioGroup.classList.add('audio-btn-group');
            const plainWord = wordObj.w.replace(/<[^>]+>/g, '');

            const btnNormal = document.createElement('button');
            btnNormal.classList.add('audio-btn');
            btnNormal.innerText = '1배속';
            btnNormal.onclick = () => playWordAudio(plainWord, 1.0);

            const btnSlow = document.createElement('button');
            btnSlow.classList.add('audio-btn');
            btnSlow.innerText = '0.25배속';
            btnSlow.onclick = () => playWordAudio(plainWord, 0.25);

            audioGroup.appendChild(btnNormal);
            audioGroup.appendChild(btnSlow);
            wordCol.appendChild(audioGroup);

            topSection.appendChild(wordCol);

            const syllableContainer = document.createElement('div');
            syllableContainer.classList.add('syllable-container');

            wordObj.ipa_parts.forEach((ipaText, idx) => {
                const card = document.createElement('div');
                card.classList.add('syllable-card');
                card.innerText = ipaText;
                
                if (idx === wordObj.stress) {
                    card.classList.add('syllable-strong');
                } else if (wordObj.secondary_stress !== undefined && idx === wordObj.secondary_stress) {
                    card.classList.add('syllable-secondary');
                } else {
                    card.classList.add('syllable-weak');
                }
                syllableContainer.appendChild(card);
            });
            
            topSection.appendChild(syllableContainer);
            row.appendChild(topSection);

            if (wordObj.steps) {
                const stepBox = document.createElement('div');
                stepBox.classList.add('step-box');
                stepBox.innerHTML = `<span class="step-highlight">${wordObj.steps}</span>`;
                row.appendChild(stepBox);
            }

            wordListContainer.appendChild(row);
        });
    }

    const bpm = 100;
    const beatsPerMeasure = 2; 
    let audioContext = null;
    let noiseBuffer = null;
    let isPlaying = false;
    let currentBeat = 0; 
    let nextNoteTime = 0.0;
    let timerID = null;
    const lookahead = 25.0; 
    const scheduleAheadTime = 0.1; 
    
    const playBtn = document.getElementById('playBtn');
    const visualDisplay = document.getElementById('visualDisplay');

    function initAudio() {
        if (!audioContext) {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioContext = new AudioContext();
            
            const emptySource = audioContext.createBufferSource();
            if(audioContext.createBuffer) {
                const buffer = audioContext.createBuffer(1, 1, 22050);
                emptySource.buffer = buffer;
                emptySource.connect(audioContext.destination);
                emptySource.start(0);
            }
            createNoiseBuffer();
        }
        if (audioContext.state === 'suspended') {
            audioContext.resume();
        }
    }

    function createNoiseBuffer() {
        if (!audioContext) return;
        const bufferSize = audioContext.sampleRate * 1.0; 
        const buffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            data[i] = (Math.random() * 2 - 1);
        }
        noiseBuffer = buffer;
    }

    function playClapSound(time) {
        if (!audioContext || !noiseBuffer) return;
        const source = audioContext.createBufferSource();
        source.buffer = noiseBuffer;
        const filter = audioContext.createBiquadFilter();
        filter.type = "lowpass"; 
        filter.frequency.value = 2000; 
        const envelope = audioContext.createGain();
        envelope.gain.setValueAtTime(1.25, time); 
        envelope.gain.exponentialRampToValueAtTime(0.01, time + 0.15); 
        source.connect(filter);
        filter.connect(envelope);
        envelope.connect(audioContext.destination);
        source.start(time);
        source.stop(time + 0.2);
    }

    function nextNote() {
        const secondsPerBeat = 60.0 / bpm;
        nextNoteTime += secondsPerBeat;
        currentBeat++;
        if (currentBeat >= beatsPerMeasure) {
            currentBeat = 0;
        }
    }

    function scheduleNote(beatNumber, time) {
        if (beatNumber === 0) {
            playClapSound(time);
        }
        const drawTime = (time - audioContext.currentTime) * 1000;
        setTimeout(() => {
            updateVisual(beatNumber);
        }, Math.max(0, drawTime));
    }

    function scheduler() {
        while (nextNoteTime < audioContext.currentTime + scheduleAheadTime) {
            scheduleNote(currentBeat, nextNoteTime);
            nextNote();
        }
        timerID = window.setTimeout(scheduler, lookahead);
    }

    function updateVisual(beatNumber) {
        if (beatNumber === 0) {
            visualDisplay.innerText = "👏🏻";
            visualDisplay.style.transform = "scale(1.3)"; 
        } else {
            visualDisplay.innerText = "🫸🏻 🫷🏻";
            visualDisplay.style.transform = "scale(1.0)"; 
        }
    }

    playBtn.addEventListener('click', function() {
        initAudio();
        isPlaying = !isPlaying;
        if (isPlaying) {
            currentBeat = 0;
            nextNoteTime = audioContext.currentTime + 0.1;
            scheduler();
            this.innerText = "STOP";
            this.classList.add("playing");
        } else {
            window.clearTimeout(timerID);
            visualDisplay.innerText = "🫸🏻 🫷🏻";
            visualDisplay.style.transform = "scale(1.0)";
            this.innerText = "START";
            this.classList.remove("playing");
        }
    });
</script>
